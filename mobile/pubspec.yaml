name: language_learning_app
description: Portfolio-Grade Japanese N5 AI Coach with 3D Avatar (Flutter + Gemini 1.5 Pro)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Architecture
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Network & API Client
  dio: ^5.4.0

  # Local Storage & Security
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # 3D Avatar & Graphics
  model_viewer_plus: ^1.7.0
  flutter_svg: ^2.0.9

  # UI / UX Utilities & Animations
  lottie: ^3.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0

  # Audio & Speech
  flutter_tts: ^4.0.0
  speech_to_text: ^7.0.0

  # OCR & Image Processing (Mock/Interface ready)
  image_picker: ^1.0.7
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/models/zero_two/
    - assets/models/zero_two/textures/
    - assets/animations/
    - assets/images/

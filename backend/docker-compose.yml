services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: language_app_sqlserver
    user: root
    ports:
      - "1111:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuperStrong!Pass2026
      - MSSQL_PID=Express
    volumes:
      - mssql_data:/var/opt/mssql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P SuperStrong!Pass2026 -C -Q 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: language_app_redis
    ports:
      - "1113:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: language_app_db_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql_scripts:/sql_scripts
    command: >
      bash -c "echo '⏳ Waiting for SQL Server to be ready...' &&
               sleep 5 &&
               /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'SuperStrong!Pass2026' -C -i /sql_scripts/init_mssql.sql &&
               echo '✅ SQL Server DB initialization script executed successfully.'"

  voice-engine:
    build: ./voice_engine
    container_name: language_app_voice_engine
    ports:
      - "1114:1114"
    volumes:
      - ./voice_engine:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:1114/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-gateway:
    build: .
    container_name: language_app_ai_gateway
    env_file:
      - .env
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      voice-engine:
        condition: service_started
    ports:
      - "1112:1112"
    environment:
      - JWT_SECRET_KEY=super_secret_portfolio_key_2026
      - DATABASE_URL=mssql+pymssql://sa:SuperStrong!Pass2026@sqlserver:1433/LanguageAppDB
      - REDIS_URL=redis://redis:6379/0
      - VOICE_ENGINE_URL=http://voice-engine:1114
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  mssql_data:
  redis_data:
